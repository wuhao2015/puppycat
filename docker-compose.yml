services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-puppycat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-puppycat}
      POSTGRES_DB: ${POSTGRES_DB:-puppycat}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puppycat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    env_file: .env
    environment:
      # Override host so the container reaches the db service, not localhost.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-puppycat}:${POSTGRES_PASSWORD:-puppycat}@db:5432/${POSTGRES_DB:-puppycat}
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./apps/web
      args:
        API_INTERNAL_BASE_URL: http://api:8000
        # Browser requests stay same-origin through Next. The rewrite target is
        # baked into the server build, so point it at the Docker service name.
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    env_file: .env
    environment:
      # Browser requests stay same-origin through Next; the Next server proxies
      # them to the API over the Docker network.
      API_INTERNAL_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
