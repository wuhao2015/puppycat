services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-puppycat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-puppycat}
      POSTGRES_DB: ${POSTGRES_DB:-puppycat}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puppycat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    env_file: .env
    environment:
      # Override host so the container reaches the db service, not localhost.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-puppycat}:${POSTGRES_PASSWORD:-puppycat}@db:5432/${POSTGRES_DB:-puppycat}
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./apps/web
      args:
        # The browser reaches the API via the host-published port (8001), since
        # the API container's host mapping is 8001->8000. Hardcoded (not ${...})
        # so a stale NEXT_PUBLIC_API_BASE_URL in .env cannot point it back at 8000.
        # These are baked into the client bundle at build time.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8001
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
